<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cytat dnia - Notion Widget</title>
<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent; /* Notion tło będzie widoczne */
}

.card{
  width:100%;
  max-width:600px; /* ograniczenie szerokości dla dużych ekranów */
  min-width:300px; /* minimalna szerokość dla wąskich kolumn */
  aspect-ratio: 1.5; /* proporcje widgeta */
  padding:20px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  color:white;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  backdrop-filter:blur(15px);
}

.card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80');
  background-size:cover;
  background-position:center;
  filter:brightness(0.5);
  z-index:0;
}

.quote, .author{
  position:relative;
  z-index:1;
}

.quote{
  font-size:calc(16px + 1.5vw);
  line-height:1.4;
  margin-bottom:15px;
  opacity:0;
  transform:translateY(10px);
  transition:all .5s;
}

.quote.show{
  opacity:1;
  transform:translateY(0);
}

.author{
  font-size:calc(12px + 0.8vw);
  opacity:0.8;
}
</style>
</head>
<body>
<div class="card">
  <div class="quote" id="quote"></div>
  <div class="author" id="author"></div>
</div>
<script>
const quotes=[
  {q:"Stay hungry, stay foolish",a:"Steve Jobs"},
  {q:"Action beats motivation",a:"Mark Manson"},
  {q:"Done is better than perfect",a:"Sheryl Sandberg"},
  {q:"Discipline equals freedom",a:"Jocko Willink"},
  {q:"Success is the sum of small efforts repeated daily",a:"Robert Collier"},
  {q:"What gets measured gets improved",a:"Peter Drucker"},
  {q:"Small steps every day",a:"Unknown"}
];

function quoteOfTheDay(){
  const today=new Date();
  const dayNumber=Math.floor(today.getTime() / (1000*60*60*24));
  const index = dayNumber % quotes.length;
  const qEl = document.getElementById("quote");
  const aEl = document.getElementById("author");
  const q = quotes[index];
  qEl.innerText = q.q;
  aEl.innerText = "— " + q.a;
  qEl.classList.add("show");
}

quoteOfTheDay();
</script>
</body>
</html>
